apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: training-planner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_YOUR_GIT_REPO_URL
    targetRevision: HEAD
    path: ops/apps/training-planner/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: training-planner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
