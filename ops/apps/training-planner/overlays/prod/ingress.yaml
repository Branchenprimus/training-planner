apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: training-planner
  namespace: training-planner
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: sports.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: training-planner
                port:
                  name: http
